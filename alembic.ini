# Alembic configuration file
# This file is read by `alembic` commands.

[alembic]
# Path to the migrations directory
script_location = migrations

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Max length of the slug portion of a migration filename
truncate_slug_length = 40

# sys.path is prepended with this value before importing
prepend_sys_path = .

# ─── Database URL ─────────────────────────────────────────────────────────────
# We use an EMPTY sqlalchemy.url here because env.py reads DATABASE_URL
# from the .env file at runtime (cleaner — no secrets in alembic.ini)
sqlalchemy.url =

# ─── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
